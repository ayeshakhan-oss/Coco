<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  width:1080px; height:1080px; overflow:hidden;
  font-family:'Nunito', Georgia, sans-serif;
  background: #0d3d7a;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  position:relative;
}
/* Geometric decorations */
.ring1 { position:absolute; width:500px; height:500px; border-radius:50%;
  border:60px solid rgba(255,255,255,0.05); top:-120px; right:-120px; }
.ring2 { position:absolute; width:320px; height:320px; border-radius:50%;
  border:40px solid rgba(255,255,255,0.04); bottom:-80px; left:-80px; }
.dot1 { position:absolute; width:18px; height:18px; border-radius:50%;
  background:#1b5e20; top:200px; left:100px; }
.dot2 { position:absolute; width:12px; height:12px; border-radius:50%;
  background:rgba(255,255,255,0.2); bottom:220px; right:130px; }
.green-line { position:absolute; top:0; left:0; width:10px; height:100%;
  background:linear-gradient(180deg, #1b5e20, #2e7d32); }

.inner { text-align:center; z-index:2; padding:0 120px; }

.eyebrow {
  font-size:13px; font-weight:800; color:rgba(255,255,255,0.5);
  letter-spacing:4px; text-transform:uppercase; margin-bottom:36px;
}
.quote-mark {
  font-family:'Playfair Display', Georgia, serif;
  font-size:160px; color:rgba(255,255,255,0.08);
  line-height:0.7; margin-bottom:-20px;
}
h1 {
  font-family:'Playfair Display', Georgia, serif;
  font-size:68px; color:white; line-height:1.2; margin-bottom:24px;
}
h1 em { color:#81c784; font-style:italic; }
.sub {
  font-size:20px; color:rgba(255,255,255,0.65);
  font-weight:600; line-height:1.6; margin-bottom:48px;
}
.divider { width:60px; height:4px;
  background:linear-gradient(90deg,#1b5e20,#4caf50);
  border-radius:4px; margin:0 auto 32px; }
.tag {
  display:inline-block;
  border:2px solid rgba(255,255,255,0.25);
  color:rgba(255,255,255,0.65);
  font-size:13px; font-weight:700;
  padding:8px 22px; border-radius:30px;
  letter-spacing:1px;
}

.slide-num {
  position:absolute; bottom:40px; right:56px;
  font-size:13px; color:rgba(255,255,255,0.3); font-weight:700; z-index:2;
}
.brand {
  position:absolute; bottom:40px; left:56px;
  font-size:13px; color:rgba(255,255,255,0.3); font-weight:700; z-index:2;
  letter-spacing:1px;
}
</style></head><body>
<div class="ring1"></div>
<div class="ring2"></div>
<div class="dot1"></div>
<div class="dot2"></div>
<div class="green-line"></div>
<div class="inner">
  <div class="eyebrow">People &amp; Culture · Taleemabad</div>
  <div class="quote-mark">&ldquo;</div>
  <h1>We used to<br>stay <em>silent.</em></h1>
  <div class="divider"></div>
  <div class="sub">Then we decided that<br>wasn&rsquo;t good enough.</div>
  <div class="tag">A story about two values that changed how we hire</div>
</div>
<div class="brand">Taleemabad</div>
<div class="slide-num">1 / 6</div>
</body></html>
