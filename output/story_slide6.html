<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  width:1080px; height:1080px; overflow:hidden;
  font-family:'Nunito', sans-serif;
  background:linear-gradient(160deg, #0d3d7a 0%, #1565c0 60%, #1b5e20 100%);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  position:relative;
}
.ring1 { position:absolute; width:600px; height:600px; border-radius:50%;
  border:50px solid rgba(255,255,255,0.05); top:-180px; right:-180px; }
.ring2 { position:absolute; width:400px; height:400px; border-radius:50%;
  border:30px solid rgba(255,255,255,0.04); bottom:-120px; left:-120px; }
.dot { position:absolute; width:14px; height:14px; border-radius:50%;
  background:rgba(255,255,255,0.2); }

.inner { text-align:center; z-index:2; padding:0 100px; }

.values-row {
  display:flex; justify-content:center; gap:16px; margin-bottom:44px;
}
.val-pill {
  background:rgba(255,255,255,0.12);
  border:1.5px solid rgba(255,255,255,0.2);
  border-radius:30px; padding:10px 24px;
  font-size:13px; font-weight:800; color:rgba(255,255,255,0.85);
  letter-spacing:1px; text-transform:uppercase;
}
.val-pill.green { background:rgba(27,94,32,0.4); border-color:rgba(129,199,132,0.35); color:#a5d6a7; }

.divider-line { width:60px; height:3px;
  background:rgba(255,255,255,0.25); border-radius:3px; margin:0 auto 36px; }

h2 { font-family:'Playfair Display', Georgia, serif;
  font-size:62px; color:white; line-height:1.25; margin-bottom:20px; }
h2 em { color:#a5d6a7; font-style:italic; }
h2 span { color:#90caf9; }

.sub { font-size:19px; color:rgba(255,255,255,0.65);
  font-weight:600; line-height:1.7; margin-bottom:48px; }

.cta-row { display:flex; justify-content:center; gap:16px; }
.cta {
  background:rgba(255,255,255,0.12);
  border:1.5px solid rgba(255,255,255,0.2);
  border-radius:12px; padding:14px 28px;
  text-align:center;
}
.cta .icon { font-size:26px; margin-bottom:6px; }
.cta .label { font-size:12px; font-weight:800; color:rgba(255,255,255,0.6);
  letter-spacing:1px; text-transform:uppercase; }

.brand { position:absolute; bottom:36px; left:0; right:0; text-align:center;
  font-size:13px; color:rgba(255,255,255,0.3); font-weight:700;
  letter-spacing:2px; z-index:2; }
</style></head><body>
<div class="ring1"></div><div class="ring2"></div>
<div class="dot" style="top:160px;left:130px;"></div>
<div class="dot" style="bottom:200px;right:150px;width:8px;height:8px;"></div>

<div class="inner">
  <div class="values-row">
    <div class="val-pill">Courageous Conversations</div>
    <div class="val-pill green">Continuously Improve</div>
  </div>
  <div class="divider-line"></div>
  <h2>This is what our<br><em>values</em> look like<br>in <span>practice.</span></h2>
  <div class="sub">
    Not on a wall. Not in a handbook.<br>
    In how we show up — even when the answer is no.
  </div>
  <div class="cta-row">
    <div class="cta">
      <div class="icon">💬</div>
      <div class="label">Say the hard thing</div>
    </div>
    <div class="cta">
      <div class="icon">✍️</div>
      <div class="label">Write it well</div>
    </div>
    <div class="cta">
      <div class="icon">🤲</div>
      <div class="label">Leave them better</div>
    </div>
  </div>
</div>
<div class="brand">Taleemabad &nbsp;·&nbsp; People &amp; Culture &nbsp;·&nbsp; taleemabad.com</div>
</body></html>
