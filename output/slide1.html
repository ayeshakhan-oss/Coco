<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 1080px; height: 1080px; overflow: hidden;
  font-family: 'Nunito', Arial, sans-serif;
  background: linear-gradient(150deg, #e8584c 0%, #c94030 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative;
}
/* decorative circles */
.c1 { position:absolute; width:420px; height:420px; border-radius:50%;
  background:rgba(255,255,255,0.07); top:-100px; right:-100px; }
.c2 { position:absolute; width:280px; height:280px; border-radius:50%;
  background:rgba(255,255,255,0.05); bottom:-60px; left:-60px; }
.c3 { position:absolute; width:160px; height:160px; border-radius:50%;
  background:rgba(255,224,102,0.12); bottom:140px; right:60px; }

.inner { text-align:center; z-index:2; padding: 0 80px; }

.eyebrow {
  font-size: 15px; font-weight: 800; color: rgba(255,255,255,0.7);
  letter-spacing: 3px; text-transform: uppercase; margin-bottom: 28px;
}

.envelope-row {
  display: flex; align-items: center; justify-content: center;
  gap: 32px; margin-bottom: 44px;
}
.env-box {
  background: white; border-radius: 20px;
  width: 160px; height: 112px;
  display: flex; align-items: center; justify-content: center;
  font-size: 58px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.18);
}
.arrow { font-size: 52px; color: #ffe066; }

h1 {
  font-family: 'Fredoka One', 'Arial Black', sans-serif;
  font-size: 62px; color: white; line-height: 1.2;
  margin-bottom: 12px;
}
h1 span { color: #ffe066; }

.sub {
  font-size: 22px; color: rgba(255,255,255,0.8);
  font-weight: 600; font-style: italic; margin-bottom: 40px;
}

.pill {
  display: inline-block;
  background: #ffe066; color: #5a3e00;
  font-size: 14px; font-weight: 800;
  padding: 8px 24px; border-radius: 30px;
  letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 0;
}

.brand {
  position: absolute; bottom: 36px; left: 0; right: 0;
  text-align: center;
  font-size: 15px; font-weight: 800; color: rgba(255,255,255,0.55);
  letter-spacing: 2px; text-transform: uppercase; z-index: 2;
}
.slide-num {
  position: absolute; bottom: 36px; right: 52px;
  font-size: 15px; color: rgba(255,255,255,0.45); font-weight: 700; z-index: 2;
}
</style></head><body>
<div class="c1"></div><div class="c2"></div><div class="c3"></div>
<div class="inner">
  <div class="eyebrow">People &amp; Culture · Taleemabad</div>
  <div class="envelope-row">
    <div class="env-box">😔</div>
    <div class="arrow">➜</div>
    <div class="env-box">🤗</div>
  </div>
  <h1>What If Rejection Emails<br>Didn't Feel Like<br><span>Rejection?</span></h1>
  <div class="sub">A story of craft, courage, and care.</div>
  <div class="pill">Taleemabad · People &amp; Culture</div>
</div>
<div class="brand">Continuously Improving Our Craft</div>
<div class="slide-num">1 / 3</div>
</body></html>
